.gl-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;border-bottom:1px solid #1f2426;padding-bottom:14px;margin-bottom:16px}
.gl-brand{display:flex;align-items:center;gap:13px}
.gl-dot{width:13px;height:13px;border-radius:50%;background:var(--sig);box-shadow:0 0 12px var(--sig);flex:none;transition:background .4s,box-shadow .4s}
.gl-brand h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;margin:0;line-height:.9}
.gl-brand h1 span{color:var(--sig);transition:color .4s}
.gl-brand p{margin:3px 0 0;font-size:11px;letter-spacing:.5px;color:#7c8388;text-transform:uppercase}
.gl-tabs{display:flex;flex-wrap:wrap;gap:4px;background:#121517;border:1px solid #1f2426;border-radius:10px;padding:4px}
.gl-tabs button{font-family:'Archivo';font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#7c8388;background:none;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.2s}
.gl-tabs button.on{background:var(--sig);color:#0b0d0e}
.gl-warn-bar{background:#2a1d12;border:1px solid #4a3416;color:#f0c089;font-size:12px;padding:9px 13px;border-radius:9px;margin-bottom:14px}
.gl-datebar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.gl-datebar>button{width:38px;height:38px;border-radius:9px;background:#14171a;border:1px solid #23282b;color:#e8eae6;font-size:20px;cursor:pointer;transition:.15s}
.gl-datebar>button:hover{border-color:var(--sig)}
.gl-datelabel{flex:1;display:flex;flex-direction:column;line-height:1.25}
.gl-datelabel strong{font-size:17px}
.gl-datelabel span{font-size:11.5px;color:#7c8388;letter-spacing:.4px;text-transform:uppercase}
.gl-today-btn{width:auto!important;padding:0 14px;font-family:'Archivo';font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#7c8388!important}
.gl-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.gl-card{background:linear-gradient(180deg,#15191b,#101315);border:1px solid #21262a;border-radius:14px;padding:18px 18px 20px;animation:rise .5s both}
.gl-card:nth-child(2){animation-delay:.06s}.gl-card:nth-child(3){animation-delay:.12s}.gl-card:nth-child(4){animation-delay:.18s}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.gl-full,.gl-hero{grid-column:1/-1}
.gl-card h2{font-family:'Archivo';font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa1a6;margin:0 0 14px}
.gl-hero{display:flex;gap:26px;align-items:center}.gl-ring{flex:none}
.gl-ring-num{font-family:'Bebas Neue';font-size:46px}.gl-ring-lab{font-family:'JetBrains Mono';font-size:9px;letter-spacing:2px}
.gl-hero-txt{flex:1;min-width:0}
.gl-band{font-family:'Bebas Neue';font-size:30px;letter-spacing:2px;display:block;line-height:1}
.gl-hero-sub{margin:4px 0 12px;color:#b9bfc2;font-size:14px;max-width:46ch}
.gl-drivers{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px}
.gl-drivers li{font-family:'JetBrains Mono';font-size:11.5px;color:#9aa1a6;padding-left:14px;position:relative}
.gl-drivers li:before{content:'';position:absolute;left:0;top:6px;width:6px;height:6px;border-radius:50%;background:#5b6168}
.gl-drivers li b{color:#cfd4d7;font-weight:500;margin-right:5px}
.tone-good:before{background:#34d399!important}.tone-warn:before{background:#fbbf24!important}.tone-bad:before{background:#fb5b5b!important}
.tone-good{color:#9fd9b8!important}.tone-warn{color:#e6c98a!important}.tone-bad{color:#f0a3a3!important}
.gl-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.gl-num{display:flex;flex-direction:column;gap:5px}.gl-num span{font-size:11px;color:#8a9088;letter-spacing:.3px}
.gl-num input,.gl-date{background:#0e1113;border:1px solid #262b2f;border-radius:8px;color:#e8eae6;font-family:'JetBrains Mono';font-size:16px;padding:9px 11px;width:100%}
.gl-num input:focus,.gl-date:focus{outline:none;border-color:var(--sig)}
.gl-sliders{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
.gl-slider{display:flex;justify-content:space-between;align-items:center;gap:12px}
.gl-slider-lab{font-size:12.5px;color:#aeb4b8;flex:1}.gl-slider-lab b{color:var(--sig);margin-left:8px;font-family:'JetBrains Mono'}
.gl-pips{display:flex;gap:6px}
.gl-pips button{width:26px;height:26px;border-radius:7px;border:1px solid #2a2f33;background:#0e1113;cursor:pointer;transition:.15s}
.gl-pips button.on{background:var(--sig);border-color:var(--sig)}
.gl-pain{margin-top:14px;border-top:1px solid #1f2426;padding-top:14px}
.gl-pain-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8a9088}
.gl-pain-row{display:flex;gap:8px;margin-top:8px}
.gl-pain-row select{flex:1;background:#0e1113;border:1px solid #262b2f;color:#e8eae6;font-family:'Archivo';font-size:13px;padding:9px;border-radius:8px}
.gl-pain-flag{margin:9px 0 0;font-size:12px;color:#f0a3a3}
.gl-adapted{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;background:var(--sig);color:#0b0d0e;padding:2px 7px;border-radius:5px;margin-left:8px;vertical-align:middle}
.gl-sessions{display:flex;flex-direction:column;gap:9px}
.gl-session{background:#0e1113;border:1px solid #21262a;border-left:3px solid #2a2f33;border-radius:10px;padding:12px 13px}
.gl-session.st-skip{opacity:.6}
.gl-session.st-easy,.gl-session.st-reduced{border-left-color:#fbbf24}.gl-session.st-rest{border-left-color:#5b6168}.gl-session.st-tuned{border-left-color:var(--sig)}
.gl-s-head{display:flex;align-items:center;gap:11px}
.gl-s-tag{font-family:'JetBrains Mono';font-weight:700;font-size:11px;color:#0b0d0e;padding:4px 6px;border-radius:6px;flex:none}
.gl-s-title{flex:1;display:flex;flex-direction:column;line-height:1.3}
.gl-s-title b{font-size:14px;font-weight:600}.gl-s-title span{font-family:'JetBrains Mono';font-size:12px;color:#8a9088}
.gl-s-title s{color:#5b6168}.gl-s-title em{font-style:normal;font-weight:600}
.gl-s-status{text-transform:uppercase;font-size:10px;letter-spacing:.5px}
.gl-s-status.st-skip{color:#fb5b5b}.gl-s-status.st-easy,.gl-s-status.st-reduced{color:#fbbf24}.gl-s-status.st-tuned{color:var(--sig)}
.gl-done{font-family:'Archivo';font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#8a9088;background:#14181b;border:1px solid #262b2f;border-radius:7px;padding:7px 11px;cursor:pointer;transition:.15s;flex:none}
.gl-done.on{background:#193227;border-color:#2f5b45;color:#6ee7a8}
.gl-s-note{margin:8px 0 0;font-size:12px;color:#c7a06a}
.gl-s-log{display:flex;gap:14px;margin-top:10px;border-top:1px solid #1c2123;padding-top:10px}
.gl-s-log label{display:flex;flex-direction:column;gap:4px;font-size:10px;color:#8a9088;text-transform:uppercase;letter-spacing:.4px}
.gl-s-log input{width:78px;background:#0b0d0e;border:1px solid #262b2f;border-radius:7px;color:#e8eae6;font-family:'JetBrains Mono';padding:6px 8px}
.gl-why{margin-top:14px;background:#0c0f11;border:1px solid #1f2426;border-radius:10px;padding:12px 14px}
.gl-why-title{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:#8a9088;display:block;margin-bottom:7px}
.gl-why p{margin:5px 0;font-size:13px;line-height:1.45}
.gl-load-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gl-stat,.gl-acwr{display:flex;flex-direction:column;gap:4px}
.gl-acwr{grid-column:1/-1;border-top:1px solid #1f2426;padding-top:13px;margin-top:2px}
.gl-stat-label{font-size:11px;color:#8a9088;letter-spacing:.4px;text-transform:uppercase}
.gl-stat-val{font-family:'Bebas Neue';font-size:34px;line-height:.9}.gl-stat-val i{font-family:'JetBrains Mono';font-size:12px;font-style:normal;color:#6b7280;margin-left:5px}
.gl-acwr-val{font-family:'Bebas Neue';font-size:40px;line-height:.85}
.gl-acwr-bar{position:relative;height:8px;background:#1a1e21;border-radius:5px;margin-top:5px;overflow:hidden}
.gl-acwr-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;transition:width .5s}
.gl-acwr-sweet{position:absolute;left:40%;width:25%;top:0;height:100%;border-left:1px dashed #3f464b;border-right:1px dashed #3f464b}
.gl-acwr-note{font-size:10.5px;color:#6b7280;font-family:'JetBrains Mono';margin-top:5px}
.gl-empty,.gl-muted{color:#8a9088;font-size:13.5px;line-height:1.5}
.gl-muted code{background:#0e1113;border:1px solid #262b2f;border-radius:4px;padding:1px 5px;font-size:12px;color:#c5f82a}
.gl-perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gl-perf-card{background:#0e1113;border:1px solid #21262a;border-radius:11px;padding:14px}
.gl-perf-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}.gl-perf-head b{font-size:14px}.gl-perf-n{margin-left:auto;font-size:10px;color:#6b7280;font-family:'JetBrains Mono'}
.gl-perf-trend{display:flex;flex-direction:column;line-height:1}.gl-perf-pct{font-family:'Bebas Neue';font-size:36px}.gl-perf-lab{font-size:10px;color:#7c8388;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.gl-perf-mult{font-family:'JetBrains Mono';font-size:13px;margin:10px 0 6px}
.gl-perf-rat{font-size:11.5px;line-height:1.4;margin:0}
.gl-tang-val{font-family:'Bebas Neue';font-size:40px;line-height:1;color:#e8eae6;display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
.gl-tang-unit{font-family:'Archivo';font-size:12px;color:#8a9088;letter-spacing:.3px}
.gl-tang-delta{font-family:'JetBrains Mono';font-size:11px;margin:7px 0 9px;line-height:1.4}
.gl-s-detail{margin-top:8px}
.gl-s-target{font-size:11px;color:#9aa1a6;font-family:'JetBrains Mono';margin-bottom:6px;line-height:1.4}
.gl-steps-toggle{background:none;border:none;color:var(--sig);font-size:11px;font-weight:600;cursor:pointer;padding:0;letter-spacing:.3px}
.gl-steps{margin:8px 0 2px;padding-left:18px;display:flex;flex-direction:column;gap:5px}
.gl-steps li{font-size:12px;color:#cfd4d7;line-height:1.45}
.gl-swap-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.gl-move-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px}
.gl-moved-tag{display:inline-block;margin-left:7px;font-family:'JetBrains Mono';font-size:9.5px;color:#2dd4bf;background:#0c2622;border:1px solid #1c4d44;border-radius:5px;padding:1px 5px;vertical-align:middle;font-weight:400}
.gl-session.moved{border-left:2px solid #2dd4bf}
.gl-swap-lbl{font-size:11px;color:#8a9088}
.gl-swap-sel{font-family:'Archivo';font-size:16px;background:#0e1113;border:1px solid #262b2f;color:#cfd4d7;border-radius:7px;padding:5px 8px}
.gl-extras{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.gl-extra{display:flex;align-items:center;gap:9px;background:#0e1113;border:1px solid #21262a;border-radius:9px;padding:9px 11px}
.gl-extra-txt{font-size:12.5px;color:#cfd4d7;flex:1}
.gl-extra-x{background:none;border:none;color:#8a9088;font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
.gl-add-btn{margin-top:10px;background:#0e1113;border:1px dashed #2f363b;color:#8a9088;border-radius:9px;padding:9px 13px;font-size:12.5px;cursor:pointer;font-family:'Archivo'}
.gl-add-btn:hover{color:var(--sig);border-color:var(--sig)}
.gl-add-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:9px;margin-top:10px;background:#0e1113;border:1px solid #21262a;border-radius:9px;padding:11px}
.gl-add-form label{display:flex;flex-direction:column;font-size:10px;color:#8a9088;gap:3px;text-transform:uppercase;letter-spacing:.4px}
.gl-add-form select,.gl-add-form input{font-family:'Archivo';font-size:16px;background:#14181b;border:1px solid #262b2f;color:#e8eae6;border-radius:7px;padding:6px 8px}
.gl-add-form input{width:64px}
.gl-add-confirm{background:var(--sig);color:#0b0d0e;border:none;border-radius:7px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:'Archivo'}
.gl-add-cancel{background:none;border:1px solid #2f363b;color:#8a9088;border-radius:7px;padding:8px 12px;cursor:pointer;font-family:'Archivo'}
.gl-session.st-skip{opacity:.55}
.gl-grade{margin-top:11px;background:#0e1113;border:1px solid #21262a;border-radius:10px;padding:12px}
.gl-grade-head{display:flex;align-items:center;gap:11px}
.gl-grade-badge{font-family:'Bebas Neue';font-size:24px;line-height:1;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:11px;color:#0b0d0e;flex-shrink:0}
.gl-grade-badge.gr-A{background:#34d399}
.gl-grade-badge.gr-B{background:#c5f82a}
.gl-grade-badge.gr-C{background:#fbbf24}
.gl-grade-badge.gr-D{background:#fb7a4a}
.gl-grade-badge.gr-F{background:#fb5b5b}
.gl-grade-meta{flex:1;display:flex;flex-direction:column}
.gl-grade-meta b{font-family:'Archivo';font-size:14px;color:#e8eae6}
.gl-grade-meta span{font-size:10.5px;color:#7c8388}
.gl-grade-score{font-family:'JetBrains Mono';font-size:20px;color:#cfd4d7;font-weight:700}
.gl-grade-score i{font-size:11px;color:#6b7280;font-style:normal}
.gl-grade-verdict{font-size:12.5px;color:#cfd4d7;line-height:1.5;margin:9px 0 4px;font-style:italic}
.gl-grade-parts{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:7px}
.gl-grade-parts li{background:#15191b;border-radius:8px;padding:8px 10px;border-left:3px solid #3a4046}
.gl-grade-parts li.gp-good{border-left-color:#34d399}
.gl-grade-parts li.gp-warn{border-left-color:#fbbf24}
.gl-grade-parts li.gp-bad{border-left-color:#fb5b5b}
.gp-row{display:flex;justify-content:space-between;align-items:center}
.gp-row b{font-family:'Archivo';font-size:12px;color:#e8eae6}
.gp-row em{font-family:'JetBrains Mono';font-size:12px;font-style:normal;color:#fb5b5b;font-weight:700}
.gp-row em.gp-zero{color:#34d399}
.gp-detail{display:block;font-size:11.5px;color:#9aa1a6;line-height:1.4;margin-top:3px}
.gl-macro{margin-top:11px;border-top:1px solid #21262a;padding-top:10px}
.gl-macro-h{font-family:'JetBrains Mono';font-size:11px;color:#c5f82a;letter-spacing:.5px}
.gl-macro p{font-size:12px;color:#aab0b4;line-height:1.5;margin:6px 0 0}
.gl-macro-marker b{color:#e8eae6}
.gl-macro-note{font-size:10.5px;color:#6b7280;font-style:italic}
.gl-graded-list{display:flex;flex-direction:column;gap:10px}
.gl-graded-item{background:#0e1113;border:1px solid #21262a;border-radius:10px;padding:11px}
.gl-graded-top{display:flex;align-items:center;gap:11px;cursor:pointer}
.gl-graded-info{flex:1;display:flex;flex-direction:column}
.gl-graded-info b{font-family:'Archivo';font-size:13.5px;color:#e8eae6}
.gl-graded-info span{font-size:10.5px;color:#7c8388}
.gl-graded-caret{color:#6b7280;font-size:12px}
.gl-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
.gl-modal{background:#15191b;border:1px solid #2a2f33;border-radius:16px;max-width:380px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.55);max-height:86vh;overflow:auto}
.gl-modal h3{margin:8px 0 12px;font-family:'Archivo';font-size:18px;color:#e8eae6}

.gl-modal-icon.ok{background:#0f3d2e;color:#34d399}
.gl-modal-icon.warn{background:#3d2a0f;color:#fbbf24}
.gl-modal-line{font-size:13px;color:#aab0b4;margin:4px 0;line-height:1.45}
.gl-modal-rows{background:#0e1113;border:1px solid #21262a;border-radius:9px;padding:10px 12px;margin:11px 0;font-family:'JetBrains Mono';font-size:11.5px;color:#cfd4d7;line-height:1.75}

.gl-modal-today.miss{background:#2a1f0f;border:1px solid #5e4a1f}

.gl-modal-today span{color:#cfd4d7;line-height:1.4}
.gl-modal .gl-btn{margin-top:8px;width:100%}
.gl-install-steps{margin:10px 0 4px;padding-left:20px}
.gl-install-steps li{font-size:13px;color:#cfd4d7;line-height:1.6;margin-bottom:4px}
.gl-share-ico{display:inline-block;background:#0e1113;border:1px solid #2f363b;border-radius:5px;padding:0 6px;color:#38bdf8;font-weight:700}
.gl-dl-card{background:#0e1113;border:1px solid #21262a;border-radius:11px;padding:13px 14px}
.gl-dl-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px solid #191d20;font-size:12px}

.gl-dl-k{color:#8a9088;flex:none}
.gl-dl-v{color:#cfd4d7;font-family:'JetBrains Mono';font-size:11px;text-align:right;flex:1}.gl-dl-v b{color:#e8eae6}
.gl-dl-d{font-family:'JetBrains Mono';font-weight:700;font-size:11px;min-width:46px;text-align:right}
.gl-disc-toggle{display:flex;gap:6px;margin-bottom:12px}
.gl-disc-toggle button{font-family:'Archivo';font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:6px 14px;border-radius:8px;border:1px solid #262b2f;background:#0e1113;color:#8a9088;cursor:pointer}
.gl-wo-table{display:flex;flex-direction:column;font-family:'JetBrains Mono';font-size:12px}
.gl-wo-row{display:grid;grid-template-columns:1.2fr .8fr .6fr .6fr .6fr .6fr .5fr;gap:6px;padding:8px 4px;border-bottom:1px solid #1a1e21;align-items:center}
.gl-wo-h{color:#6b7280;text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-bottom:1px solid #2a2f33}
.gl-wo-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.gl-btn{font-family:'Archivo';font-weight:600;font-size:13px;letter-spacing:.5px;background:var(--sig);color:#0b0d0e;border:none;border-radius:9px;padding:11px 18px;cursor:pointer;margin-top:12px;transition:.15s}
.gl-btn:hover{filter:brightness(1.1)}
.gl-btn.danger{background:#2a1518;color:#fb5b5b;border:1px solid #4a2226}
.gl-btn-row{display:flex;gap:10px;flex-wrap:wrap}
.gl-import-msg{margin-top:12px;font-size:13px;color:#6ee7a8}
.gl-toggle{width:52px;height:28px;border-radius:16px;background:#262b2f;border:none;cursor:pointer;position:relative;margin-top:12px;transition:.2s;vertical-align:middle}
.gl-toggle.on{background:var(--sig)}

.gl-toggle-lab{font-size:12px;color:#8a9088;margin-left:10px;text-transform:uppercase;letter-spacing:.5px}
.gl-trend-note,.gl-foot{font-size:11.5px;color:#6b7280;line-height:1.5}
.gl-trend-note{margin:12px 0 0}
.gl-foot{margin-top:18px;border-top:1px solid #1f2426;padding-top:13px;text-align:center}
.gl-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.gl-cal-head h2{margin:0}
.gl-cal-head button{width:34px;height:34px;border-radius:8px;background:#14171a;border:1px solid #23282b;color:#e8eae6;font-size:18px;cursor:pointer}
.gl-cal-head button:hover{border-color:var(--sig)}
.gl-cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.gl-cal-dow span{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:#6b7280;text-align:center}
.gl-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.gl-cell{position:relative;min-height:76px;background:#0e1113;border:1px solid #1c2123;border-left:3px solid #23282b;border-radius:9px;padding:6px 7px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px;transition:.12s;overflow:hidden;font-family:'Archivo'}
.gl-cell:hover{border-color:var(--sig)}
.gl-cell.out{opacity:.32}
.gl-cell.today{box-shadow:inset 0 0 0 1px var(--sig)}
.gl-cell.sel{border-color:var(--sig);background:#14181b}
.gl-cell-top{display:flex;align-items:center;justify-content:space-between}
.gl-cell-top b{font-family:'JetBrains Mono';font-size:13px;font-weight:500}
.gl-cell-band{width:8px;height:8px;border-radius:50%}
.gl-cell-sess{display:flex;gap:3px;flex-wrap:wrap}
.gl-cell-d{width:9px;height:9px;border-radius:2px}
.gl-cell-ph{font-family:'JetBrains Mono';font-size:9px;letter-spacing:1px;font-weight:700}
.gl-cell-done{font-family:'JetBrains Mono';font-size:9px;color:#6ee7a8}
.gl-cell-ms{font-family:'Archivo';font-size:7.5px;font-weight:700;letter-spacing:.4px;padding:2px 4px;border-radius:4px;margin-top:auto;text-align:center;background:#23282b;color:#cfd4d7}
.gl-cell-ms.k-goal{background:var(--sig);color:#0b0d0e}.gl-cell-ms.k-race{background:#fb7a4a;color:#0b0d0e}.gl-cell-ms.k-test{background:#38bdf8;color:#0b0d0e}.gl-cell-ms.k-taper{background:#a78bfa;color:#0b0d0e}
.gl-cal-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid #1f2426;font-size:11px;color:#8a9088}
.gl-cal-legend>span{display:flex;align-items:center;gap:5px}
.gl-cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.gl-leg-disc i{margin-left:6px}
.gl-plan-lead{color:#b9bfc2;font-size:14px;line-height:1.5;margin:0 0 14px}
.gl-target-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gl-target{background:#0e1113;border:1px solid #21262a;border-radius:11px;padding:14px}
.gl-target-lab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8a9088;display:block}
.gl-target-val{font-family:'Bebas Neue';font-size:32px;color:var(--sig);line-height:1;display:block;margin:4px 0}
.gl-target-note{font-size:11px;color:#7c8388;line-height:1.4}
.gl-premise{display:flex;flex-direction:column;gap:13px}
.gl-premise-item{display:flex;gap:13px}
.gl-premise-n{font-family:'Bebas Neue';font-size:26px;color:var(--sig);flex:none;width:24px;text-align:center;line-height:1}
.gl-premise-item b{font-size:14px}.gl-premise-item p{margin:3px 0 0;font-size:13px;color:#9aa1a6;line-height:1.45}
.gl-phases{display:flex;flex-direction:column;gap:10px}
.gl-phase{background:#0e1113;border:1px solid #1c2123;border-left:3px solid #23282b;border-radius:10px;padding:13px 15px}
.gl-phase.cur{background:#14181b;border-color:#2a2f33}
.gl-phase-head{display:flex;align-items:center;gap:10px}.gl-phase-head b{font-size:14px}
.gl-phase-now{font-family:'JetBrains Mono';font-size:9px;background:var(--sig);color:#0b0d0e;padding:2px 7px;border-radius:5px;text-transform:uppercase}
.gl-phase-meta{font-family:'JetBrains Mono';font-size:11px;color:#7c8388;display:block;margin:3px 0 7px}
.gl-phase-focus{font-size:13px;color:#cfd4d7;margin:0 0 8px}
.gl-phase ul,.gl-ref-block ul{margin:0;padding-left:18px;display:flex;flex-direction:column;gap:4px}
.gl-phase li,.gl-ref-block li{font-size:12.5px;color:#9aa1a6;line-height:1.4}
.gl-ref{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gl-ref-block b{font-size:13px;display:block;margin-bottom:8px}
.gl-karoo{font-family:'JetBrains Mono';font-size:10px;font-weight:700;letter-spacing:.3px;color:#c5f82a;background:#1a200a;border:1px solid #3a4a14;border-radius:7px;padding:7px 9px;cursor:pointer;transition:.15s;flex:none}
.gl-karoo:hover{background:#222a0d;border-color:#c5f82a}
.gl-lib{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.gl-lib-row{display:flex;align-items:center;gap:11px;background:#0e1113;border:1px solid #1c2123;border-radius:9px;padding:9px 11px}
.gl-lib-name{flex:1;font-size:13px;color:#cfd4d7}.gl-lib-name em{font-family:'JetBrains Mono';font-style:normal;font-size:11px;color:#7c8388}
.gl-lib-btn{font-family:'JetBrains Mono';font-size:11px;font-weight:700;color:#0b0d0e;background:var(--sig);border:none;border-radius:7px;padding:7px 12px;cursor:pointer;flex:none}
.gl-lib-btn:hover{filter:brightness(1.1)}
@media(max-width:720px){
.gl-root{padding:12px}
.gl-card{padding:15px 14px 16px}
.gl-grid,.gl-load-grid,.gl-perf-grid,.gl-target-grid,.gl-ref{grid-template-columns:1fr}
.gl-hero{flex-direction:column;text-align:center;gap:16px}
.gl-drivers li{text-align:left}
.gl-s-head{flex-wrap:wrap}
.gl-s-title{min-width:55%}
.gl-s-log input,.gl-pain-row select,.gl-date,.gl-num input{font-size:16px}
.gl-wo-table{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gl-wo-row{min-width:330px;font-size:11px}
.gl-cell{min-height:54px;padding:4px 5px}
.gl-cal-grid{gap:3px}
.gl-cell-ms{font-size:7px;padding:1px 3px}
.gl-cal-legend{font-size:10px;gap:9px}
}
@media(max-width:430px){
.gl-head{gap:10px}
.gl-brand h1{font-size:26px}
.gl-tabs{width:100%;justify-content:center}
.gl-tabs button{padding:6px 10px;font-size:11px}
.gl-band{font-size:26px}
.gl-target-val{font-size:28px}
.gl-cell{min-height:48px;padding:3px 4px}
.gl-cell-top b{font-size:11px}
.gl-cell-d{width:7px;height:7px}
.gl-cell-ph{font-size:8px}
.gl-cal-head h2{font-size:18px}
.gl-karoo,.gl-done{padding:6px 9px}
}
